<!DOCTYPE html>
<html>

<head>
<title>Edit Task</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="form-box">

<h2>Edit Task</h2>

<form method="POST">

<label>Title</label>
<input type="text" name="title" value="{{task.title}}" required>

<label>Description</label>
<textarea name="description">{{task.description}}</textarea>

<label>Due Date</label>
<input type="date" name="due_date" value="{{task.due_date}}">

<label>Status</label>
<select name="status">

<option {% if task.status == 'Pending' %}selected{% endif %}>Pending</option>
<option {% if task.status == 'In Progress' %}selected{% endif %}>In Progress</option>
<option {% if task.status == 'Completed' %}selected{% endif %}>Completed</option>

</select>

<label>Remarks</label>
<textarea name="remarks">{{task.remarks}}</textarea>

<label>Updated By</label>
<input type="text" name="updated_by">

<button type="submit">Update Task</button>

</form>

</div>

</body>
</html>
